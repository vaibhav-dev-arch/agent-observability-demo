# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: agent-observability-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
